spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/claveunica}
    username: ${SPRING_DATASOURCE_USERNAME:claveunica}
    password: ${SPRING_DATASOURCE_PASSWORD:claveunica}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
server:
  port: 8080
