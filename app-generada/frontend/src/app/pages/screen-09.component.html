<section class="card screen-header layout-sessions" data-screen="09" style="--accent:#1d4ed8">
  <p>Seguridad</p>
  <h1>Sesiones activas</h1>
  <p>Sesiones activas: informacion actualizada desde la base local y acciones del flujo ciudadano.</p>
  <div class="action-row"><button *ngFor="let action of screen.actions" (click)="run(action)">{{action}}</button></div>
</section>
<section class="card kanban">
  <article *ngFor="let row of rows()"><strong>{{row[0]}}</strong><span>{{row[1]}}</span><small>{{row[2]}}</small></article>
</section>
